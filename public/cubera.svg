<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="ore" x1="6" y1="4" x2="58" y2="60" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F5D4A8"/>
      <stop offset="0.35" stop-color="#E8A86A"/>
      <stop offset="0.65" stop-color="#D4894A"/>
      <stop offset="1" stop-color="#6B3818"/>
    </linearGradient>
    <linearGradient id="ore-bright" x1="16" y1="10" x2="48" y2="50" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF0DC"/>
      <stop offset="1" stop-color="#D4894A"/>
    </linearGradient>
    <linearGradient id="facet" x1="18" y1="10" x2="50" y2="54" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2E2620"/>
      <stop offset="0.55" stop-color="#1A1612"/>
      <stop offset="1" stop-color="#0A0908"/>
    </linearGradient>
    <radialGradient id="glow" cx="32" cy="32" r="28" gradientUnits="userSpaceOnUse">
      <stop stop-color="#D4894A" stop-opacity="0.22"/>
      <stop offset="0.55" stop-color="#D4894A" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#D4894A" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Ambient ore glow -->
  <circle cx="32" cy="32" r="30" fill="url(#glow)"/>

  <!-- Hex mineral plate -->
  <path
    d="M8 18 L32 4 L56 18 L56 42 L32 60 L8 42 Z"
    fill="url(#facet)"
    stroke="rgba(232,168,106,0.42)"
    stroke-width="1.35"
  />

  <!-- Crystal facet planes -->
  <path d="M32 4 L56 18 L32 30 L8 18 Z" fill="rgba(245,212,168,0.1)"/>
  <path d="M8 18 L32 30 L32 60 L8 42 Z" fill="rgba(0,0,0,0.32)"/>
  <path d="M56 18 L32 30 L32 60 L56 42 Z" fill="rgba(212,137,74,0.12)"/>

  <!-- Inner rim highlight -->
  <path
    d="M14 20 L32 9 L50 20 L50 40 L32 54 L14 40 Z"
    fill="none"
    stroke="rgba(232,168,106,0.14)"
    stroke-width="0.75"
  />

  <!-- Fractured C monogram -->
  <path
    d="M40.5 22.5c-1.4-2.8-4.6-4.7-8.3-4.7-5.4 0-9.5 3.9-9.5 9.7v9c0 5.8 4.1 9.7 9.5 9.7 3.7 0 6.9-1.9 8.3-4.7"
    stroke="url(#ore)"
    stroke-width="3.6"
    stroke-linecap="round"
    fill="none"
    filter="url(#soft-glow)"
  />
  <path
    d="M40.5 22.5c-1.4-2.8-4.6-4.7-8.3-4.7-5.4 0-9.5 3.9-9.5 9.7v9c0 5.8 4.1 9.7 9.5 9.7 3.7 0 6.9-1.9 8.3-4.7"
    stroke="url(#ore-bright)"
    stroke-width="1.4"
    stroke-linecap="round"
    fill="none"
    opacity="0.55"
  />

  <!-- Ore vein fracture -->
  <path
    d="M21 27 L29.5 32.5 L27.5 39.5 L35.5 43.5 L39 48"
    stroke="url(#ore-bright)"
    stroke-width="1.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.92"
  />
  <circle cx="39" cy="48" r="2" fill="#F0C08A" opacity="0.95"/>
  <circle cx="39" cy="48" r="3.5" fill="#D4894A" opacity="0.18"/>
</svg>
